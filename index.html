<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Novare Res Chalice Tracker</title>
<meta name="description" content="Track your progress through the Novare Res Bier Cafe chalice list">
<meta name="theme-color" content="#1a0a00">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Chalice">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>* { box-sizing: border-box; margin: 0; padding: 0; } body { font-family: Georgia, serif; background: #1a0a00; color: #f5e6c8; -webkit-font-smoothing: antialiased; } input, button, textarea { font-family: inherit; }</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script src="data.js"></script>
<script type="text/babel" data-type="module">
const { useState, useMemo, useEffect, useCallback } = React;
const { BEERS, ALL_CHOICES, DRAFT_URL, BOTTLE_URL, DRAFT_DATE, BOTTLE_DATE, SHEET_DATE, BOTTLE_FIRST_SEEN } = window;

const T = 234;
const STORAGE_KEY = 'nrct_drunk_overrides';
const STORAGE_VERSION = 1;
const CURRENT_YEAR = new Date().getFullYear();

// ---------- localStorage helpers (with reconciliation) ----------
function loadOverrides() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return { version: STORAGE_VERSION, named: {}, choices: {} };
    const parsed = JSON.parse(raw);
    return {
      version: STORAGE_VERSION,
      named: parsed.named || {},
      choices: parsed.choices || {}
    };
  } catch (e) {
    console.warn('Failed to load overrides:', e);
    return { version: STORAGE_VERSION, named: {}, choices: {} };
  }
}

function saveOverrides(o) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(o)); }
  catch (e) { console.warn('Failed to save overrides:', e); }
}

// Reconcile: drop any overrides where data.js already shows the beer as drunk.
// This is what makes a fresh data.js push (from the spreadsheet) auto-clean local state.
function reconcileOverrides(o) {
  const drunkNamed = new Set(BEERS.filter(b => b.drunk).map(b => b.id));
  const drunkChoices = new Set(ALL_CHOICES.filter(c => c.drunk).map(c => c.slot));
  const named = {};
  const choices = {};
  for (const [id, rec] of Object.entries(o.named || {})) {
    if (!drunkNamed.has(id)) named[id] = rec;
  }
  for (const [slot, rec] of Object.entries(o.choices || {})) {
    if (!drunkChoices.has(slot)) choices[slot] = rec;
  }
  return { version: STORAGE_VERSION, named, choices };
}

function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}

// ---------- NEW badge ----------
const NOW = new Date();
const isNewBottle = (id) => {
  const seen = BOTTLE_FIRST_SEEN && BOTTLE_FIRST_SEEN[id];
  if (!seen) return false;
  return (NOW - new Date(seen)) / (1000 * 60 * 60 * 24) <= 30;
};

// ---------- App ----------
function App() {
  const [tab, setTab] = useState('chalice');
  const [cf, setCf] = useState('available');
  const [lf, setLf] = useState('all');
  const [q, setQ] = useState('');
  const [sort, setSort] = useState('abv');
  const [overrides, setOverrides] = useState(() => reconcileOverrides(loadOverrides()));
  const [logFor, setLogFor] = useState(null);
  const [toast, setToast] = useState(null);
  const [showPending, setShowPending] = useState(true);

  // Persist on every change
  useEffect(() => { saveOverrides(overrides); }, [overrides]);

  // Compute "effective drunk" = data.js drunk OR locally overridden
  const isNamedDrunk = useCallback((id) => {
    const b = BEERS.find(x => x.id === id);
    return (b && b.drunk) || !!overrides.named[id];
  }, [overrides]);

  const isChoiceDrunk = useCallback((slot) => {
    const c = ALL_CHOICES.find(x => x.slot === slot);
    return (c && c.drunk) || !!overrides.choices[slot];
  }, [overrides]);

  // Counts factor in overrides
  const BD = useMemo(() => BEERS.filter(b => isNamedDrunk(b.id)).length, [overrides]);
  const CD = useMemo(() => ALL_CHOICES.filter(c => isChoiceDrunk(c.slot)).length, [overrides]);
  const CT = ALL_CHOICES.length;
  const CR = CT - CD;
  const TD = BD + CD;
  const CM = useMemo(() => ALL_CHOICES.filter(c => !isChoiceDrunk(c.slot) && c.m && c.m.length > 0).length, [overrides]);
  const pendingCount = Object.keys(overrides.named).length + Object.keys(overrides.choices).length;

  const rows = useMemo(() => {
    const r = [];
    for (const b of BEERS) {
      if (isNamedDrunk(b.id)) continue;
      if (b.draft) r.push({ id: b.id, src: 'Draft', isNew: false, ...b.draft });
      if (b.bottle) r.push({ id: b.id, src: 'Bottle/Can', isNew: isNewBottle(b.id), ...b.bottle });
    }
    return r;
  }, [overrides]);

  const pn = id => id.replace(/\b\w/g, c => c.toUpperCase());

  const filt = useMemo(() => {
    const s = q.toLowerCase();
    return rows.filter(r => lf === 'all' || r.src === lf)
      .filter(r => !s || r.id.includes(s) || r.brewery.toLowerCase().includes(s) || r.style.toLowerCase().includes(s))
      .sort((a, b) => sort === 'ut' ? ((b.ut || 0) - (a.ut || 0)) || a.abvNum - b.abvNum : a.abvNum - b.abvNum);
  }, [rows, lf, q, sort]);

  const uc = useMemo(() => new Set(rows.map(r => r.id)).size, [rows]);
  const newCount = useMemo(() => rows.filter(r => r.isNew).length, [rows]);
  const pct = Math.round((TD / T) * 100);
  const vc = useMemo(() =>
    cf === 'available'
      ? ALL_CHOICES.filter(c => !isChoiceDrunk(c.slot) && c.m && c.m.length > 0)
      : ALL_CHOICES.filter(c => !isChoiceDrunk(c.slot)),
    [cf, overrides]);

  const utLink = (b, n) => 'https://untappd.com/search?q=' + encodeURIComponent(b + ' ' + n);

  // ---------- Actions ----------
  const markDrunk = (kind, idOrSlot, year, rating, notes, actualBeer) => {
    const rec = {
      year: parseInt(year, 10) || CURRENT_YEAR,
      date: todayISO(),
      rating: rating ? parseFloat(rating) : null,
      notes: notes || ''
    };
    if (kind === 'choice') rec.actual_beer = actualBeer || '';
    setOverrides(o => {
      const next = { ...o };
      if (kind === 'named') next.named = { ...o.named, [idOrSlot]: rec };
      else next.choices = { ...o.choices, [idOrSlot]: rec };
      return next;
    });
    const label = kind === 'named' ? pn(idOrSlot) : idOrSlot;
    setToast({
      msg: `✓ Marked "${label}" as drunk`,
      undo: () => {
        setOverrides(o => {
          const next = { ...o };
          if (kind === 'named') { const m = { ...o.named }; delete m[idOrSlot]; next.named = m; }
          else { const m = { ...o.choices }; delete m[idOrSlot]; next.choices = m; }
          return next;
        });
        setToast(null);
      }
    });
    setLogFor(null);
    setTimeout(() => setToast(t => (t && t.msg.includes(label)) ? null : t), 6000);
  };

  const clearOverride = (kind, key) => {
    setOverrides(o => {
      const next = { ...o };
      if (kind === 'named') { const m = { ...o.named }; delete m[key]; next.named = m; }
      else { const m = { ...o.choices }; delete m[key]; next.choices = m; }
      return next;
    });
  };

  const clearAllOverrides = () => {
    if (confirm(`Clear all ${pendingCount} pending local entries? Use this once they're in the spreadsheet.`)) {
      setOverrides({ version: STORAGE_VERSION, named: {}, choices: {} });
    }
  };

  const copyPendingTSV = async () => {
    const lines = ['Type\tBeer/Slot\tYear\tDate\tRating\tNotes\tActual Beer'];
    for (const [id, r] of Object.entries(overrides.named)) {
      lines.push(['Named', pn(id), r.year, r.date, r.rating == null ? '' : r.rating, r.notes, ''].join('\t'));
    }
    for (const [slot, r] of Object.entries(overrides.choices)) {
      lines.push(['Choice', slot, r.year, r.date, r.rating == null ? '' : r.rating, r.notes, r.actual_beer || ''].join('\t'));
    }
    try {
      await navigator.clipboard.writeText(lines.join('\n'));
      setToast({ msg: `✓ Copied ${pendingCount} entries as TSV — paste into spreadsheet` });
      setTimeout(() => setToast(null), 4000);
    } catch (e) {
      alert('Clipboard blocked. Here it is:\n\n' + lines.join('\n'));
    }
  };

  // ---------- Style helpers ----------
  const ts = a => ({ padding: '9px 18px', borderRadius: '8px 8px 0 0', border: 'none', cursor: 'pointer', fontSize: 12, fontWeight: 'bold', background: a ? '#2a1200' : '#1a0a00', color: a ? '#f5c842' : '#c9a87a', borderBottom: a ? '2px solid #f5c842' : '2px solid transparent' });
  const sb = (l, v, c) => <div key={l} style={{ flex: '1 1 130px', background: '#2a1200', border: `1px solid ${c}44`, borderRadius: 10, padding: '10px 14px', textAlign: 'center' }}><div style={{ fontSize: 26, fontWeight: 'bold', color: c }}>{v}</div><div style={{ fontSize: 10, color: '#c9a87a', marginTop: 2 }}>{l}</div></div>;
  const btnDrunk = { background: '#4caf78', color: '#000', border: 'none', borderRadius: 4, padding: '4px 10px', fontSize: 10, fontWeight: 'bold', cursor: 'pointer', letterSpacing: 0.3 };

  return (
    <div style={{ fontFamily: 'Georgia, serif', background: '#1a0a00', minHeight: '100vh', color: '#f5e6c8', paddingBottom: toast ? 70 : 0 }}>
      <div style={{ background: 'linear-gradient(135deg, #3d1a00, #6b3010)', padding: '18px 24px', borderBottom: '3px solid #c17f3a' }}>
        <div style={{ maxWidth: 900, margin: '0 auto', display: 'flex', alignItems: 'center', gap: 16 }}>
          <img src="https://novareresbiercafe.com/wp-content/uploads/novare-brl-wm-cr.png" alt="" style={{ height: 50, flexShrink: 0, filter: 'brightness(1.2)' }} onError={e => { e.target.style.display = 'none'; }} />
          <div style={{ flex: 1 }}>
            <h1 style={{ margin: 0, fontSize: 22, color: '#f5c842', letterSpacing: 2, textTransform: 'uppercase' }}>Chalice Tracker</h1>
            <p style={{ margin: '4px 0 0', color: '#c9a87a', fontSize: 11 }}>
              <a href={DRAFT_URL} target="_blank" rel="noopener" style={{ color: '#7ab8f5', textDecoration: 'none' }}>Draft {DRAFT_DATE}</a>
              {' | '}
              <a href={BOTTLE_URL} target="_blank" rel="noopener" style={{ color: '#d4a862', textDecoration: 'none' }}>Bottle {BOTTLE_DATE}</a>
              {' | Spreadsheet: ' + SHEET_DATE}
            </p>
          </div>
        </div>
      </div>
      <div style={{ maxWidth: 900, margin: '0 auto', padding: '16px' }}>

        {pendingCount > 0 && (
          <div style={{ marginBottom: 14, background: '#2a2a10', border: '1px solid #f5c842', borderRadius: 10, overflow: 'hidden' }}>
            <div style={{ padding: '10px 14px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 8, cursor: 'pointer' }} onClick={() => setShowPending(!showPending)}>
              <div style={{ fontSize: 12, color: '#f5c842', fontWeight: 'bold' }}>
                ⚠ {pendingCount} beer{pendingCount > 1 ? 's' : ''} logged locally — not yet in spreadsheet {showPending ? '▾' : '▸'}
              </div>
              <div style={{ display: 'flex', gap: 6 }}>
                <button onClick={e => { e.stopPropagation(); copyPendingTSV(); }} style={{ background: '#4caf78', color: '#000', border: 'none', borderRadius: 5, padding: '5px 10px', fontSize: 10, fontWeight: 'bold', cursor: 'pointer' }}>Copy as TSV</button>
                <button onClick={e => { e.stopPropagation(); clearAllOverrides(); }} style={{ background: '#3d1a00', color: '#c9a87a', border: '1px solid #6b3010', borderRadius: 5, padding: '5px 10px', fontSize: 10, fontWeight: 'bold', cursor: 'pointer' }}>Clear all</button>
              </div>
            </div>
            {showPending && (
              <div style={{ padding: '0 14px 12px', display: 'flex', flexDirection: 'column', gap: 5 }}>
                {Object.entries(overrides.named).map(([id, r]) => (
                  <div key={id} style={{ background: '#1a0a00', borderRadius: 5, padding: '6px 10px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 8, flexWrap: 'wrap', fontSize: 11 }}>
                    <div style={{ flex: '1 1 200px' }}>
                      <span style={{ color: '#f5e6c8', fontWeight: 'bold' }}>{pn(id)}</span>
                      <span style={{ color: '#8a6a4a', marginLeft: 8 }}>{r.year}{r.rating ? ` • ★${r.rating}` : ''}{r.notes ? ` • ${r.notes}` : ''}</span>
                    </div>
                    <button onClick={() => clearOverride('named', id)} style={{ background: 'transparent', color: '#8a6a4a', border: '1px solid #3d1a00', borderRadius: 4, padding: '2px 7px', fontSize: 10, cursor: 'pointer' }}>✕</button>
                  </div>
                ))}
                {Object.entries(overrides.choices).map(([slot, r]) => (
                  <div key={slot} style={{ background: '#1a0a00', borderRadius: 5, padding: '6px 10px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 8, flexWrap: 'wrap', fontSize: 11 }}>
                    <div style={{ flex: '1 1 200px' }}>
                      <span style={{ color: '#f5e6c8', fontWeight: 'bold' }}>[Choice] {slot}</span>
                      <span style={{ color: '#8a6a4a', marginLeft: 8 }}>{r.year}{r.actual_beer ? ` → ${r.actual_beer}` : ''}{r.rating ? ` • ★${r.rating}` : ''}{r.notes ? ` • ${r.notes}` : ''}</span>
                    </div>
                    <button onClick={() => clearOverride('choice', slot)} style={{ background: 'transparent', color: '#8a6a4a', border: '1px solid #3d1a00', borderRadius: 4, padding: '2px 7px', fontSize: 10, cursor: 'pointer' }}>✕</button>
                  </div>
                ))}
                <div style={{ fontSize: 10, color: '#6b4020', marginTop: 6, lineHeight: 1.4 }}>
                  These entries are stored only in this browser. After updating the spreadsheet, they'll auto-clear next time a fresh <code style={{ background: '#1a0a00', padding: '1px 4px', borderRadius: 3 }}>data.js</code> is pushed. Or hit "Clear all" once they're synced.
                </div>
              </div>
            )}
          </div>
        )}

        <div style={{ display: 'flex', gap: 8, marginBottom: 8, flexWrap: 'wrap' }}>{sb('Total Chalice', T, '#c9a87a')}{sb('Drunk at Novare', TD, '#4caf78')}{sb('Still Needed', T - TD, '#e87040')}{sb('Named Available', uc, '#f5c842')}</div>
        <div style={{ display: 'flex', gap: 8, marginBottom: 16, flexWrap: 'wrap' }}>{sb('Choice Slots', CT, '#b07fd4')}{sb('Choices Drunk', CD, '#4caf78')}{sb('Choices Remaining', CR, '#e87040')}{sb('Choices w/ Match', CM, '#f5c842')}</div>
        <div style={{ marginBottom: 16, background: '#2a1200', borderRadius: 10, padding: '12px 16px' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 5, fontSize: 12, color: '#c9a87a' }}><span>Progress: {TD}/{T} ({BD} named + {CD} choices){pendingCount > 0 ? ` • +${pendingCount} pending` : ''}</span><span>{pct}%</span></div>
          <div style={{ background: '#3d1a00', borderRadius: 20, height: 14, overflow: 'hidden' }}><div style={{ height: '100%', width: `${pct}%`, background: 'linear-gradient(90deg, #c17f3a, #f5c842)', borderRadius: 20 }} /></div>
        </div>
        <div style={{ background: '#1a2a3a', border: '1px solid #4a90d9', borderRadius: 10, padding: '9px 14px', marginBottom: 14, fontSize: 12, color: '#a8c8e8' }}>
          <strong>Draft {DRAFT_DATE}!</strong> Coniston Bluebird on the <strong>Beer Engine</strong>, Airline Blonde on Nitro, Allagash Lager (cask race winner), Maine Beer Dunkel, Ayinger Maibock, Von Trapp Boho Pils, Schilling Modernism, Allagash White & Curieux, Trillium Congress Street, Nothing Gold, Flume, Boon Geuze Selection, Allagash Coolship Red + Means & Strategy.
        </div>
        {newCount > 0 && (
          <div style={{ background: '#1a3a1a', border: '1px solid #4caf78', borderRadius: 10, padding: '9px 14px', marginBottom: 14, fontSize: 12, color: '#a8e8b8' }}>
            <strong style={{ color: '#4caf78' }}>✨ {newCount} NEW</strong> bottle{newCount > 1 ? 's' : ''} on the list (last 30 days) — look for the green <span style={{ background: '#4caf78', color: '#000', borderRadius: 3, padding: '1px 5px', fontSize: 10, fontWeight: 'bold' }}>NEW</span> badge.
          </div>
        )}
        <div style={{ display: 'flex', gap: 3, borderBottom: '2px solid #3d1a00', marginBottom: 0 }}>
          <button style={ts(tab === 'chalice')} onClick={() => setTab('chalice')}>Chalice Beers ({uc} available)</button>
          <button style={ts(tab === 'choices')} onClick={() => setTab('choices')}>Choices ({CM} w/ match / {CR} remaining)</button>
        </div>
        {tab === 'chalice' && (
          <div style={{ background: '#2a1200', borderRadius: '0 8px 8px 8px', padding: '14px' }}>
            <div style={{ display: 'flex', gap: 8, marginBottom: 12, flexWrap: 'wrap', alignItems: 'center' }}>
              <input value={q} onChange={e => setQ(e.target.value)} placeholder="Search beer, brewery, or style..." style={{ flex: '1 1 180px', padding: '7px 12px', borderRadius: 8, border: '1px solid #6b3010', background: '#1a0a00', color: '#f5e6c8', fontSize: 12, outline: 'none' }} />
              {['all', 'Draft', 'Bottle/Can'].map(f => <button key={f} onClick={() => setLf(f)} style={{ padding: '7px 14px', borderRadius: 8, border: 'none', cursor: 'pointer', fontSize: 12, fontWeight: 'bold', background: lf === f ? '#c17f3a' : '#3d1a00', color: lf === f ? '#fff' : '#c9a87a' }}>{f === 'all' ? 'All' : f}</button>)}
              <span style={{ width: 1, background: '#3d1a00', margin: '0 2px' }} />
              {[['abv', 'ABV ↑'], ['ut', '★ Rating ↓']].map(([v, l]) => <button key={v} onClick={() => setSort(v)} style={{ padding: '7px 12px', borderRadius: 8, border: 'none', cursor: 'pointer', fontSize: 11, fontWeight: 'bold', background: sort === v ? '#4a3a10' : '#3d1a00', color: sort === v ? '#f5c842' : '#8a6a4a' }}>{l}</button>)}
            </div>
            <p style={{ color: '#c9a87a', fontSize: 11, marginBottom: 10 }}><strong style={{ color: '#f5c842' }}>{filt.length}</strong> entries — sorted by {sort === 'ut' ? 'Untappd rating' : 'ABV'} — tap ★ for Untappd, tap ✓ when you drink it</p>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
              {filt.map((o, i) => (
                <div key={i} style={{ background: '#1a0a00', borderLeft: `4px solid ${o.src === 'Draft' ? '#4a90d9' : '#c17f3a'}`, border: `1px solid ${o.src === 'Draft' ? '#4a90d922' : '#c17f3a22'}`, borderRadius: 7, padding: '9px 14px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 10, flexWrap: 'wrap' }}>
                  <div style={{ flex: '1 1 180px' }}>
                    <div style={{ fontWeight: 'bold', fontSize: 13, color: '#f5e6c8', display: 'flex', alignItems: 'center', gap: 6, flexWrap: 'wrap' }}>
                      {pn(o.id)}
                      {o.isNew && <span style={{ background: '#4caf78', color: '#000', borderRadius: 3, padding: '1px 6px', fontSize: 9, fontWeight: 'bold', letterSpacing: 0.5 }}>NEW</span>}
                    </div>
                    <div style={{ fontSize: 11, color: '#c9a87a', marginTop: 1 }}>{o.brewery} — {o.style}</div>
                  </div>
                  <div style={{ display: 'flex', gap: 6, alignItems: 'center', flexWrap: 'wrap' }}>
                    {o.ut && <a href={o.utUrl || utLink(o.brewery, o.id)} target="_blank" rel="noopener" style={{ display: 'inline-flex', alignItems: 'center', gap: 2, textDecoration: 'none', background: o.ut >= 4.3 ? '#3a2a00' : '#2a1200', borderRadius: 4, padding: '2px 6px' }}><span style={{ color: o.ut >= 4.3 ? '#f5c842' : o.ut >= 3.8 ? '#c9a87a' : '#8a6a4a', fontSize: 10, fontWeight: 'bold' }}>★ {o.ut.toFixed(1)}</span></a>}
                    <span style={{ background: o.src === 'Draft' ? '#1a3a5a' : '#3a2800', color: o.src === 'Draft' ? '#7ab8f5' : '#d4a862', borderRadius: 4, padding: '2px 8px', fontSize: 10, fontWeight: 'bold' }}>{o.src === 'Draft' ? 'DRAFT' : 'BOTTLE'}</span>
                    <span style={{ color: '#f5c842', fontWeight: 'bold', fontSize: 12 }}>{o.abv}</span>
                    <span style={{ color: '#c9a87a', fontSize: 11 }}>{o.sz}</span>
                    <span style={{ color: '#4caf78', fontSize: 12, fontWeight: 'bold' }}>{o.price}</span>
                    <button onClick={() => setLogFor({ kind: 'named', id: o.id, name: pn(o.id), suggested: '' })} style={btnDrunk}>✓ DRUNK</button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
        {tab === 'choices' && (
          <div style={{ background: '#2a1200', borderRadius: '0 8px 8px 8px', padding: '14px' }}>
            <div style={{ background: '#1a2a3a', border: '1px solid #4a90d9', borderRadius: 9, padding: '9px 13px', marginBottom: 12, fontSize: 12, color: '#a8c8e8' }}><strong style={{ color: '#7ab8f5' }}>{CT} Choice Slots:</strong> {CD} drunk / {CR} remaining / <strong style={{ color: '#f5c842' }}>{CM} with a match now</strong></div>
            <div style={{ display: 'flex', gap: 7, marginBottom: 12 }}>{[['available', `Has Match (${CM})`], ['all', `All Remaining (${CR})`]].map(([v, l]) => <button key={v} onClick={() => setCf(v)} style={{ padding: '6px 13px', borderRadius: 7, border: 'none', cursor: 'pointer', fontSize: 11, fontWeight: 'bold', background: cf === v ? '#c17f3a' : '#3d1a00', color: cf === v ? '#fff' : '#c9a87a' }}>{l}</button>)}</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 9 }}>
              {vc.map((a, i) => (
                <div key={i} style={{ background: '#1a0a00', border: `1px solid ${a.m.length > 0 ? '#4a90d9' : '#3d1a00'}`, borderRadius: 9, overflow: 'hidden' }}>
                  <div style={{ background: a.m.length > 0 ? '#1a2a3a' : '#251200', padding: '8px 13px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 6 }}>
                    <div><span style={{ fontWeight: 'bold', color: '#f5c842', fontSize: 12 }}>{a.slot}</span><span style={{ marginLeft: 7, fontSize: 10, color: '#c9a87a', background: '#2a1200', padding: '1px 6px', borderRadius: 3 }}>{a.cat}</span></div>
                    <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
                      {a.m.length > 0 ? <span style={{ background: '#4caf78', color: '#000', borderRadius: 4, padding: '2px 8px', fontSize: 10, fontWeight: 'bold' }}>{a.m.length} match{a.m.length > 1 ? 'es' : ''}</span> : <span style={{ background: '#3d1a00', color: '#c9a87a', borderRadius: 4, padding: '2px 8px', fontSize: 10 }}>no match</span>}
                      <button onClick={() => setLogFor({ kind: 'choice', id: a.slot, name: a.slot, suggested: a.m && a.m[0] ? a.m[0].n : '' })} style={btnDrunk}>✓ DRUNK</button>
                    </div>
                  </div>
                  {a.m.length > 0 && <div style={{ padding: '9px 13px', display: 'flex', flexDirection: 'column', gap: 7 }}>
                    {a.m.map((x, j) => (
                      <div key={j} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 10, flexWrap: 'wrap', borderBottom: j < a.m.length - 1 ? '1px solid #2a1200' : 'none', paddingBottom: j < a.m.length - 1 ? 7 : 0 }}>
                        <div style={{ flex: '1 1 160px' }}><div style={{ fontWeight: 'bold', fontSize: 12, color: '#f5e6c8' }}>{x.n}</div><div style={{ fontSize: 10, color: '#c9a87a', marginTop: 1 }}>{x.b}</div><div style={{ fontSize: 10, color: '#8ab8a8', marginTop: 2, fontStyle: 'italic' }}>{x.note}</div></div>
                        <div style={{ display: 'flex', gap: 6, alignItems: 'center', flexWrap: 'wrap' }}>
                          {x.ut && <a href={utLink(x.b, x.n)} target="_blank" rel="noopener" style={{ display: 'inline-flex', alignItems: 'center', gap: 2, textDecoration: 'none', background: x.ut >= 4.3 ? '#3a2a00' : '#2a1200', borderRadius: 4, padding: '2px 6px' }}><span style={{ color: x.ut >= 4.3 ? '#f5c842' : x.ut >= 3.8 ? '#c9a87a' : '#8a6a4a', fontSize: 10, fontWeight: 'bold' }}>★ {x.ut.toFixed(1)}</span></a>}
                          <span style={{ background: x.s === 'd' ? '#1a3a5a' : '#3a2800', color: x.s === 'd' ? '#7ab8f5' : '#d4a862', borderRadius: 4, padding: '2px 7px', fontSize: 10, fontWeight: 'bold' }}>{x.s === 'd' ? 'DRAFT' : 'BOTTLE'}</span>
                          <span style={{ color: '#f5c842', fontWeight: 'bold', fontSize: 11 }}>{x.abv}</span><span style={{ color: '#c9a87a', fontSize: 10 }}>{x.sz}</span><span style={{ color: '#4caf78', fontSize: 11, fontWeight: 'bold' }}>{x.p}</span>
                        </div>
                      </div>
                    ))}
                  </div>}
                </div>
              ))}
            </div>
            <div style={{ marginTop: 14, padding: '10px 13px', background: '#1a0a00', borderRadius: 9, fontSize: 10, color: '#6b4020' }}><strong style={{ color: '#c9a87a' }}>Note:</strong> Choice matches are style-based suggestions. Always confirm with your bartender!</div>
          </div>
        )}
        <div style={{ marginTop: 12, padding: '10px 13px', background: '#2a1200', borderRadius: 9, fontSize: 10, color: '#6b4020' }}><strong style={{ color: '#c9a87a' }}>Note:</strong> Only spreadsheet-eligible beers shown. Confirm availability with staff. Local "drunk" marks are saved on this device only — sync to the spreadsheet to keep them.</div>
        <div style={{ marginTop: 16, padding: '12px 16px', background: '#2a1200', borderRadius: 9, display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: 8 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}><img src="https://novareresbiercafe.com/wp-content/uploads/novare-logo-ft-cr@2x.png" alt="" style={{ height: 30, opacity: 0.7 }} onError={e => { e.target.style.display = 'none'; }} /><span style={{ fontSize: 10, color: '#6b4020' }}>4 Canal Plaza · Portland, ME 04101 · (207) 761-2437</span></div>
          <div style={{ display: 'flex', gap: 12 }}>
            <a href={DRAFT_URL} target="_blank" rel="noopener" style={{ fontSize: 10, color: '#7ab8f5', textDecoration: 'none' }}>Draft PDF</a>
            <a href={BOTTLE_URL} target="_blank" rel="noopener" style={{ fontSize: 10, color: '#d4a862', textDecoration: 'none' }}>Bottle PDF</a>
            <a href="https://novareresbiercafe.com" target="_blank" rel="noopener" style={{ fontSize: 10, color: '#c17f3a', textDecoration: 'none' }}>novareresbiercafe.com</a>
          </div>
        </div>
      </div>

      {logFor && <LogModal logFor={logFor} onCancel={() => setLogFor(null)} onSave={markDrunk} />}

      {toast && (
        <div style={{ position: 'fixed', bottom: 16, left: '50%', transform: 'translateX(-50%)', background: '#2a3a20', border: '1px solid #4caf78', color: '#a8e8b8', padding: '10px 16px', borderRadius: 8, fontSize: 12, display: 'flex', alignItems: 'center', gap: 10, zIndex: 100, boxShadow: '0 4px 12px rgba(0,0,0,0.5)', maxWidth: 'calc(100% - 32px)' }}>
          <span>{toast.msg}</span>
          {toast.undo && <button onClick={toast.undo} style={{ background: '#4caf78', color: '#000', border: 'none', borderRadius: 4, padding: '3px 10px', fontSize: 11, fontWeight: 'bold', cursor: 'pointer' }}>Undo</button>}
        </div>
      )}
    </div>
  );
}

function LogModal({ logFor, onCancel, onSave }) {
  const [year, setYear] = useState(CURRENT_YEAR);
  const [rating, setRating] = useState('');
  const [notes, setNotes] = useState('');
  const [actualBeer, setActualBeer] = useState(logFor.suggested || '');

  const submit = () => onSave(logFor.kind, logFor.id, year, rating, notes, actualBeer);
  const inputStyle = { width: '100%', padding: '8px 10px', borderRadius: 6, border: '1px solid #6b3010', background: '#1a0a00', color: '#f5e6c8', fontSize: 13, outline: 'none' };

  return (
    <div onClick={onCancel} style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.7)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 16, zIndex: 200 }}>
      <div onClick={e => e.stopPropagation()} style={{ background: '#2a1200', border: '2px solid #c17f3a', borderRadius: 12, padding: 18, maxWidth: 380, width: '100%' }}>
        <div style={{ fontSize: 11, color: '#c9a87a', marginBottom: 4 }}>Mark as drunk</div>
        <div style={{ fontSize: 15, color: '#f5c842', fontWeight: 'bold', marginBottom: 14 }}>{logFor.name}</div>

        {logFor.kind === 'choice' && (
          <div style={{ marginBottom: 12 }}>
            <label style={{ display: 'block', fontSize: 11, color: '#c9a87a', marginBottom: 4 }}>Which beer counted? (optional)</label>
            <input value={actualBeer} onChange={e => setActualBeer(e.target.value)} placeholder="e.g. Ayinger Maibock" style={inputStyle} />
          </div>
        )}

        <div style={{ display: 'flex', gap: 10, marginBottom: 12 }}>
          <div style={{ flex: '0 0 90px' }}>
            <label style={{ display: 'block', fontSize: 11, color: '#c9a87a', marginBottom: 4 }}>Year</label>
            <input type="number" value={year} onChange={e => setYear(e.target.value)} style={inputStyle} />
          </div>
          <div style={{ flex: 1 }}>
            <label style={{ display: 'block', fontSize: 11, color: '#c9a87a', marginBottom: 4 }}>Rating (1–5, optional)</label>
            <input type="number" step="0.1" min="0" max="5" value={rating} onChange={e => setRating(e.target.value)} placeholder="e.g. 4.2" style={inputStyle} />
          </div>
        </div>

        <div style={{ marginBottom: 16 }}>
          <label style={{ display: 'block', fontSize: 11, color: '#c9a87a', marginBottom: 4 }}>Notes (optional)</label>
          <textarea value={notes} onChange={e => setNotes(e.target.value)} placeholder="What did you think?" style={{ ...inputStyle, minHeight: 60, resize: 'vertical', fontFamily: 'Georgia, serif' }} />
        </div>

        <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
          <button onClick={onCancel} style={{ background: '#3d1a00', color: '#c9a87a', border: 'none', borderRadius: 6, padding: '9px 16px', fontSize: 12, cursor: 'pointer' }}>Cancel</button>
          <button onClick={submit} style={{ background: '#4caf78', color: '#000', border: 'none', borderRadius: 6, padding: '9px 16px', fontSize: 12, fontWeight: 'bold', cursor: 'pointer' }}>✓ Mark Drunk</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(function(registrations){for(var r of registrations){r.unregister();}});}</script>
</body>
</html>
